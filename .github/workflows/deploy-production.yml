# ============================================
# CD Pipeline - Deploy to Production
# Trigger: Push/Merge to main branch
# ============================================
name: 🚀 Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: 'Skip CI checks'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  FRONTEND_PATH: ${{ secrets.FRONTEND_PATH }}
  BACKEND_PATH: ${{ secrets.BACKEND_PATH }}

jobs:
  # ─────────────────────────────────────────
  # 1. DEPLOY via SSH (pull + build + restart)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nulith.io.vn

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔎 Detect Changes
        id: changes
        run: |
          FRONTEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -c "^frontend/" || echo "0")
          BACKEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -c "^api-gateway/" || echo "0")
          echo "frontend=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT
          echo "backend=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "📊 Frontend files changed: $FRONTEND_CHANGED"
          echo "📊 Backend files changed: $BACKEND_CHANGED"

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🔒 Add Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy Frontend
        if: steps.changes.outputs.frontend != '0'
        run: |
          echo "🎨 Deploying Frontend..."
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
            set -e
            export NVM_DIR="/home/vpsroot/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Pull latest code
            cd ${{ env.FRONTEND_PATH }}/..
            git pull origin main

            # Build frontend
            cd ${{ env.FRONTEND_PATH }}
            npm ci --production=false
            NEXT_PUBLIC_API_URL=https://api.nulith.io.vn npm run build

            # Restart service
            echo '123456789' | sudo -S systemctl restart saas-frontend
            sleep 3

            # Verify
            if systemctl is-active --quiet saas-frontend; then
              echo "✅ Frontend service is running!"
            else
              echo "❌ Frontend service failed to start"
              exit 1
            fi
          EOF

      - name: ⚙️ Deploy Backend
        if: steps.changes.outputs.backend != '0'
        run: |
          echo "⚙️ Deploying Backend..."
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
            set -e

            # Pull latest code
            cd ${{ env.BACKEND_PATH }}/..
            git pull origin main

            # Install dependencies
            cd ${{ env.BACKEND_PATH }}
            source venv/bin/activate 2>/dev/null || python3 -m venv venv && source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Restart service
            echo '123456789' | sudo -S systemctl restart saas-api
            sleep 3

            # Verify
            if systemctl is-active --quiet saas-api; then
              echo "✅ Backend service is running!"
            else
              echo "❌ Backend service failed to start"
              exit 1
            fi
          EOF

      - name: ⏭️ No Changes Detected
        if: steps.changes.outputs.frontend == '0' && steps.changes.outputs.backend == '0'
        run: echo "ℹ️ No frontend or backend changes detected. Skipping deploy."

      - name: ❤️ Health Check
        if: steps.changes.outputs.frontend != '0' || steps.changes.outputs.backend != '0'
        run: |
          sleep 5
          echo "🔍 Checking frontend..."
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://nulith.io.vn/ || echo "000")
          echo "Frontend: HTTP $FRONTEND_STATUS"

          if [ "$FRONTEND_STATUS" -eq 200 ]; then
            echo "✅ Frontend is healthy!"
          else
            echo "⚠️ Frontend returned HTTP $FRONTEND_STATUS"
          fi

  # ─────────────────────────────────────────
  # 2. NOTIFICATION
  # ─────────────────────────────────────────
  notify:
    name: 📢 Notify Team
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Deploy Summary
        run: |
          echo "### 🚀 Deploy Production Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
