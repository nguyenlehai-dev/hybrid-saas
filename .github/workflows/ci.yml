# ============================================
# CI Pipeline - Kiểm tra code quality mỗi PR/Push
# ============================================
name: 🔍 CI - Lint & Test & Build

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. DETECT CHANGES - Chỉ chạy phần nào thay đổi
  # ─────────────────────────────────────────
  changes:
    name: 🔎 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'api-gateway/**'
            infra:
              - 'nginx/**'
              - 'docker-compose.yml'
              - 'scripts/**'

  # ─────────────────────────────────────────
  # 2. FRONTEND CI
  # ─────────────────────────────────────────
  frontend-ci:
    name: 🎨 Frontend CI
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔍 Lint Check
        run: npm run lint

      - name: 🔨 Build Check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.nulith.io.vn

      - name: 📊 Build Size Report
        run: |
          echo "### 📊 Frontend Build Size" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ | awk '{print "| Build Output | " $1 " |"}' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 3. BACKEND CI
  # ─────────────────────────────────────────
  backend-ci:
    name: ⚙️ Backend CI
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s 
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: api-gateway/requirements.txt

      - name: 📥 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: 🔍 Lint Check (Ruff)
        run: ruff check app/

      - name: 📐 Format Check (Ruff)
        run: ruff format --check app/

      - name: 🧪 Run Tests
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "⚠️ No tests found yet"
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DOMAIN: test.local
          API_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000

      - name: ✅ Import Check
        run: python -c "from app.main import app; print('✅ App imports OK')"
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          DOMAIN: test.local
          API_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000

  # ─────────────────────────────────────────
  # 4. SECURITY SCAN
  # ─────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: 📋 Check .env not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ .env file is committed! Remove it!"
            exit 1
          else
            echo "✅ No .env file in repo"
          fi

  # ─────────────────────────────────────────
  # 5. CI STATUS GATE
  # ─────────────────────────────────────────
  ci-passed:
    name: ✅ CI Passed
    needs: [frontend-ci, backend-ci, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.frontend-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ CI failed!"
            exit 1
          fi
          echo "✅ All CI checks passed!"
