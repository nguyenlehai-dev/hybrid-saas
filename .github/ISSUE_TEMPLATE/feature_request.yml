name: Feature Request
description: Đề xuất tính năng mới
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Mô tả tính năng
      description: Mô tả chi tiết tính năng bạn muốn
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Giải pháp đề xuất
      description: Bạn nghĩ tính năng này nên hoạt động như thế nào?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Frontend
        - Backend API
        - AI Engine
        - Database
        - Nginx/Infra
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Ưu tiên
      options:
        - Low - Có thì tốt
        - Medium - Cần thiết
        - High - Rất quan trọng
