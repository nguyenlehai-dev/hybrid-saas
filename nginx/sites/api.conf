# API Gateway - vpspanel.io.vn/api
# This config is kept for reference but the unified config handles everything.
# API is served under /api/ path on the main domain vpspanel.io.vn

server {
    listen 80;
    server_name vpspanel.io.vn;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vpspanel.io.vn;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/vpspanel.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpspanel.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API Routes ──
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts for AI tasks (can be long)
        proxy_read_timeout 180s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # Buffering for large AI responses
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
    }

    # ── Auth endpoints (stricter rate limit) ──
    location /api/auth/login {
        rewrite ^/api/(.*) /$1 break;
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── AI Generation endpoints (rate limited) ──
    location /api/ai/ {
        rewrite ^/api/(.*) /$1 break;
        limit_req zone=ai burst=5 nodelay;

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for AI processing
        proxy_read_timeout 300s;
    }

    # ── Health Check (no rate limit) ──
    location /api/health {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api_gateway;
        access_log off;
    }

    # ── Uploaded Images (static serving) ──
    location /uploads/ {
        alias /opt/hybrid-saas/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Frontend - Next.js ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
