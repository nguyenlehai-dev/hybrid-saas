# Frontend - vpspanel.io.vn
# Serve React/Next.js build or proxy to dev server

server {
    listen 80;
    server_name vpspanel.io.vn www.vpspanel.io.vn;

    # Redirect HTTP to HTTPS
    return 301 https://vpspanel.io.vn$request_uri;
}

# Redirect www to non-www
server {
    listen 443 ssl http2;
    server_name www.vpspanel.io.vn;

    ssl_certificate /etc/letsencrypt/live/vpspanel.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpspanel.io.vn/privkey.pem;

    return 301 https://vpspanel.io.vn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vpspanel.io.vn;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/vpspanel.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpspanel.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Document Root (Next.js static export or build)
    root /opt/hybrid-saas/frontend/out;
    index index.html;

    # ── Static Assets Caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── User Landing Pages ──
    location /p/ {
        alias /opt/hybrid-saas/landing-pages/;
        try_files $uri $uri/index.html =404;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
