server {
    listen 80;
    server_name api.vpspanel.io.vn;

    client_max_body_size 50M;

    # API Gateway - FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location /uploads/ {
        alias /opt/hybrid-saas/uploads/;
        expires 30d;
    }
}
server {
    listen 80;
    server_name vpspanel.io.vn www.vpspanel.io.vn;

    client_max_body_size 50M;

    # ── AI Engine Proxy (VM2 RTX 3060) ──
    # Stable Diffusion WebUI API
    location /ai-engine/ {
        rewrite ^/ai-engine/(.*) /$1 break;
        proxy_pass http://VM2_IP:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # VM2 Task API
    location /ai-tasks/ {
        rewrite ^/ai-tasks/(.*) /$1 break;
        proxy_pass http://VM2_IP:7862;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # VM2 AI Generated Images
    location /ai-outputs/ {
        rewrite ^/ai-outputs/(.*) /outputs/$1 break;
        proxy_pass http://VM2_IP:7862;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy - route /api/ requests to FastAPI backend
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 60s;
    }

    # Upload files
    location /uploads/ {
        alias /opt/hybrid-saas/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend - Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
