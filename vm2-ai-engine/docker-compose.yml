version: "3.9"

services:
  stable-diffusion:
    build:
      context: ./sd-webui
      dockerfile: Dockerfile
    container_name: ai-stable-diffusion
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - ./data/models:/stable-diffusion-webui/models
      - ./data/outputs:/stable-diffusion-webui/outputs
      - ./data/extensions:/stable-diffusion-webui/extensions
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CLI_ARGS=--api --listen --no-half-vae --opt-sdp-attention --enable-insecure-extension-access
    command: [". venv/bin/activate && pip uninstall -y xformers && python3 launch.py --skip-torch-cuda-test $${CLI_ARGS}"]
    dns:
      - 8.8.8.8
      - 8.8.4.4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai-network

  task-api:
    image: node:20-alpine
    container_name: ai-task-api
    restart: unless-stopped
    ports:
      - "7862:3000"
    working_dir: /app
    volumes:
      - ./task-api:/app
      - ./data/outputs:/outputs:ro
    command: node server.js
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
