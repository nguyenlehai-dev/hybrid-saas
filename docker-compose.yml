# ============================================================
# Hybrid SaaS - VM1 Docker Compose
# Services: API Gateway + PostgreSQL + Redis + Nginx
# ============================================================

version: "3.9"

services:
  # ── API Gateway (FastAPI) ──
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: saas-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - landing-pages:/app/landing-pages
      - ./api-gateway/app:/app/app:ro  # Hot reload in dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── PostgreSQL 15 ──
  postgres:
    image: postgres:15-alpine
    container_name: saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hybrid_saas}
      POSTGRES_USER: ${DB_USER:-saas_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-saas_admin} -d ${DB_NAME:-hybrid_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # ── Redis (Cache + Task Queue) ──
  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-changeme} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # ── Nginx (Reverse Proxy) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: saas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites/api.conf:/etc/nginx/sites-enabled/api.conf:ro
      - ./nginx/sites/frontend.conf:/etc/nginx/sites-enabled/frontend.conf:ro
      - uploads:/opt/hybrid-saas/uploads:ro
      - landing-pages:/opt/hybrid-saas/landing-pages:ro
      - nginx-logs:/var/log/nginx
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - api-gateway
    networks:
      - saas-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Certbot (SSL Certificate) ──
  certbot:
    image: certbot/certbot
    container_name: saas-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Run manually: docker compose run certbot certonly --webroot -w /var/www/certbot -d vpspanel.io.vn -d vpspanel.io.vn/api
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ── Volumes ──
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  uploads:
    driver: local
  landing-pages:
    driver: local
  nginx-logs:
    driver: local
  certbot-conf:
    driver: local
  certbot-www:
    driver: local

# ── Network ──
networks:
  saas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
